<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Gemini AI Assistant</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- FontAwesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Fonts -->

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <!-- Background Glow -->

    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="dashboard-layout">

        <!-- Sidebar -->

        <aside class="sidebar glass-card">

            <div>

                <h3 class="logo-text">

                    <i class="fa-solid fa-eye"></i>
                    RetinaAI

                </h3>

                <ul class="sidebar-menu">

                    <li>
                        <i class="fa-solid fa-chart-line"></i>
                        Dashboard
                    </li>

                    <li>
                        <i class="fa-solid fa-file-medical"></i>
                        Reports
                    </li>

                    <li class="active">
                        <i class="fa-solid fa-robot"></i>
                        AI Assistant
                    </li>

                    <li>
                        <i class="fa-solid fa-circle-info"></i>
                        About
                    </li>

                </ul>

            </div>

            <a href="/"
                class="btn btn-main w-100">

                <i class="fa-solid fa-arrow-left"></i>
                Back Home

            </a>

        </aside>

        <!-- Chat Area -->

        <main class="dashboard-main">

            <div class="glass-card chatbot-card">

                <!-- Header -->

                <div class="chat-header">

                    <div>

                        <h2>

                            Gemini AI Assistant

                        </h2>

                        <p>

                            AI-powered retina healthcare companion

                        </p>

                    </div>

                    <div class="robot-avatar">

                        <i class="fa-solid fa-robot"></i>

                    </div>

                </div>

                <!-- Chat Messages -->

                <div class="chat-messages"
                    id="chatMessages">

                    <div class="bot-message">

                        Hello 👋<br><br>

                        I am RetinaAI Assistant.<br>

                        Ask me about:
                        diabetic retinopathy,
                        retina disease,
                        symptoms,
                        prevention,
                        or eye care.

                    </div>

                </div>

                <!-- Input -->

                <div class="chat-input-container">

                    <input type="text"
                        id="chatInput"
                        placeholder="Ask RetinaAI anything...">

                    <button onclick="sendMessage()">

                        <i class="fa-solid fa-paper-plane"></i>

                    </button>

                </div>

            </div>

        </main>

    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
